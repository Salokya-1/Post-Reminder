name: Python CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'desktop_app/**'
      - '.github/workflows/python-ci.yml'

jobs:
  test-desktop-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop_app/requirements.txt

      - name: Smoke test data loader
        working-directory: desktop_app
        run: |
          python - <<'PY'
          from pathlib import Path
          from event_loader import load_events_from_xlsx

          source = Path('../SocialMedia_Calendar_2026.xlsx')
          if source.exists():
              events = load_events_from_xlsx(source)
              print(f'Loaded events: {len(events)}')
          else:
              print('No root xlsx found; skipped xlsx load')
          PY
