name: Build Desktop EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'desktop_app/**'
      - '.github/workflows/build-desktop-exe.yml'

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r desktop_app/requirements.txt

      - name: Build exe with PyInstaller
        working-directory: desktop_app
        run: |
          pyinstaller --noconfirm --onefile --name PostReminderDesktop run_desktop.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PostReminderDesktop-exe
          path: desktop_app/dist/PostReminderDesktop.exe
